name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        run: |
          if ! command -v just >/dev/null 2>&1; then
            brew install just
          fi

      - name: Show tool versions
        run: |
          go version
          just --version

      - name: Lint
        run: just lint

      - name: Build
        run: just build
